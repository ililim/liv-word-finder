<!DOCTYPE html>
<!--
  17 · Mono Minimal — the brutalist, "for people who hate apps" take on Liv Word Finder.
  Monospace type only, black and white, zero chrome: one input line (letters = anagram
  solve, ? or _ = pattern match) and a dense column of results grouped by length with
  counts. The single flourish: fixed pattern letters are underlined in the results.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>17 · Mono Minimal — Liv Word Finder</title>
<style>
  :root{ --bg:#ffffff; --fg:#000000; --dim:#8c8c8c; --faint:#dcdcdc; --side:#f0f0f0; }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#000000; --fg:#ffffff; --dim:#7d7d7d; --faint:#262626; --side:#0c0c0c; }
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:var(--side)}
  body{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    background:var(--side);color:var(--fg);
  }
  ::selection{background:var(--fg);color:var(--bg)}
  .phone{max-width:430px;margin:0 auto;background:var(--bg);min-height:100dvh;
    display:flex;flex-direction:column;border-left:1px solid var(--faint);
    border-right:1px solid var(--faint)}
  .gbar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;
    font-size:11px;color:var(--dim);border-bottom:1px solid var(--faint);flex:none}
  .gbar a{color:var(--fg);text-decoration:none;padding:4px 0}
  .gbar a:active{opacity:.5}

  .top{flex:none;padding:22px 16px 0}
  .brand{font-size:11px;color:var(--dim);letter-spacing:.08em;margin-bottom:14px}
  .inwrap{display:flex;align-items:center;border-bottom:2px solid var(--fg);padding-bottom:8px}
  .inwrap .p{font-size:19px;margin-right:8px;color:var(--dim);user-select:none}
  input{flex:1;min-height:44px;background:none;border:none;outline:none;color:var(--fg);
    font-family:inherit;font-size:19px;letter-spacing:.14em;text-transform:lowercase}
  input::placeholder{color:var(--dim);letter-spacing:.02em;font-size:14px}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);
    padding:10px 0 0;letter-spacing:.04em}
  .meta b{color:var(--fg);font-weight:700}

  .out{flex:1;overflow-y:auto;padding:6px 16px calc(28px + env(safe-area-inset-bottom))}
  .ghead{display:flex;align-items:baseline;gap:10px;margin:22px 0 10px;font-size:12px;
    color:var(--dim);letter-spacing:.06em}
  .ghead b{color:var(--fg);font-size:13px}
  .ghead .rule{flex:1;border-top:1px solid var(--faint);transform:translateY(-3px)}
  .words{font-size:15px;line-height:2.1;letter-spacing:.06em;word-spacing:.2em;
    display:flex;flex-wrap:wrap;column-gap:1.6em}
  .words span{white-space:nowrap;min-height:32px;display:inline-flex;align-items:center}
  .words u{text-decoration-thickness:1.5px;text-underline-offset:4px}
  .none{color:var(--dim);font-size:13px;margin-top:26px;line-height:1.8}
  .help{color:var(--dim);font-size:12px;line-height:2;margin-top:26px}
  .help b{color:var(--fg)}
</style>
</head>
<body>
<div class="phone">
  <div class="gbar"><a href="./index.html">‹ Gallery</a><span>17 · mono minimal</span></div>

  <div class="top">
    <div class="brand">liv word finder</div>
    <div class="inwrap">
      <span class="p">›</span>
      <input id="q" value="aerstln" autocomplete="off" autocapitalize="none" spellcheck="false"
             placeholder="letters to solve, or pattern with ? / _">
    </div>
    <div class="meta"><span id="mode">anagram</span><span id="count"></span></div>
  </div>

  <div class="out" id="out"></div>
</div>

<script>
const WORDS=(
"ale alt ant are art ate ear eat era lea let net not oat one ran rat sat sea set tan tar tea ten "+

"antlers rentals saltern sternal lantern rattles starlet slanted"
).split(" ");

const q=document.getElementById('q'),
      out=document.getElementById('out'),
      count=document.getElementById('count'),
      mode=document.getElementById('mode');

function counts(s){const m={};for(const c of s)m[c]=(m[c]||0)+1;return m}
function subsetOf(word,rack){
  const r=counts(rack),w=counts(word);
  return Object.keys(w).every(c=>r[c]>=w[c]);
}
function solve(raw){
  const s=raw.toLowerCase().replace(/[^a-z?_]/g,'');
  if(!s){render(null,null,'');return}
  const isPat=/[?_]/.test(s);
  let hits;
  if(isPat){
    const pat=s.replace(/_/g,'?');
    hits=WORDS.filter(w=>w.length===pat.length&&[...pat].every((c,i)=>c==='?'||w[i]===c));
    render(hits,pat,'pattern');
  }else{
    hits=WORDS.filter(w=>w.length>=3&&w.length<=s.length&&subsetOf(w,s));
    render(hits,null,'anagram');
  }
}
function render(hits,pat,m){
  mode.textContent=m||'—';
  out.innerHTML='';
  if(hits===null){
    count.textContent='';
    out.innerHTML='<div class="help">type <b>letters</b> to solve an anagram rack<br>'+
      'use <b>?</b> or <b>_</b> for unknown letters<br><br>'+
      'aerstln &nbsp;→ every word in the rack<br>'+
      's??re &nbsp;&nbsp;&nbsp;→ score share snore …<br>'+
      '?ough &nbsp;&nbsp;&nbsp;→ bough cough dough …</div>';
    return;
  }
  count.innerHTML='<b>'+hits.length+'</b> word'+(hits.length===1?'':'s');
  if(!hits.length){
    out.innerHTML='<div class="none">nothing.<br>english has failed you, not the other way around.</div>';
    return;
  }
  const byLen={};
  hits.forEach(w=>(byLen[w.length]=byLen[w.length]||[]).push(w));
  Object.keys(byLen).map(Number).sort((a,b)=>b-a).forEach(len=>{
    const list=[...new Set(byLen[len])].sort();
    const h=document.createElement('div');
    h.className='ghead';
    h.innerHTML='<b>'+len+'</b> letters <span class="rule"></span> '+list.length;
    out.appendChild(h);
    const d=document.createElement('div');
    d.className='words';
    d.innerHTML=list.map(w=>{
      if(!pat) return '<span>'+w+'</span>';
      return '<span>'+[...w].map((c,i)=>pat[i]!=='?'?'<u>'+c+'</u>':c).join('')+'</span>';
    }).join('');
    out.appendChild(d);
  });
}
q.addEventListener('input',()=>solve(q.value));
solve(q.value);
</script>
</body>
</html>
