<!-- Mockup 01 · Smart Search — one universal, Google-like search box that infers the tool from
     syntax: plain letters = anagram solve, "?" = blank tile, underscores = positional pattern,
     "word*" / "*word" = starts/ends with. Syntax hint chips sit under the box and results are
     grouped by word length. Radical minimalism: one input, nothing else to learn. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>01 · Smart Search — Liv Word Finder</title>
<style>
  :root{
    --bg:#ffffff; --ink:#1c1e21; --muted:#6b7280; --faint:#9ca3af;
    --line:#e5e7eb; --chip:#f3f4f6; --chip-ink:#374151;
    --accent:#2563eb; --accent-soft:#eff6ff;
    --score:#f3f4f6; --score-ink:#6b7280;
    --page:#ececee;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#111417; --ink:#f3f4f6; --muted:#9ca3af; --faint:#6b7280;
      --line:#272b31; --chip:#1d2126; --chip-ink:#c9ced6;
      --accent:#60a5fa; --accent-soft:#16202e;
      --score:#1d2126; --score-ink:#9ca3af;
      --page:#000000;
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{background:var(--page)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink); background:var(--page);
  }
  .phone{
    max-width:430px; margin:0 auto; min-height:100vh; background:var(--bg);
    box-shadow:0 0 40px rgba(0,0,0,.12); display:flex; flex-direction:column;
  }
  /* gallery bar */
  .gbar{
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 14px; font-size:12px; color:var(--faint);
    border-bottom:1px solid var(--line); background:var(--bg);
    position:sticky; top:0; z-index:10;
  }
  .gbar a{color:var(--faint); text-decoration:none; font-weight:500}
  /* app */
  .app{flex:1; display:flex; flex-direction:column; padding:0 18px 40px;}
  .brand{
    text-align:center; padding:52px 0 26px; font-size:34px; font-weight:300;
    letter-spacing:-0.5px; transition:padding .25s ease, font-size .25s ease;
  }
  .brand b{font-weight:700; color:var(--accent)}
  .app.active .brand{padding:20px 0 14px; font-size:22px}
  .searchwrap{position:relative}
  .search{
    width:100%; height:54px; border:1.5px solid var(--line); border-radius:27px;
    background:var(--bg); color:var(--ink);
    font-size:19px; font-weight:500; letter-spacing:1px;
    padding:0 46px 0 48px; outline:none; text-transform:uppercase;
    -webkit-appearance:none; appearance:none;
    box-shadow:0 1px 6px rgba(0,0,0,.05);
  }
  .search::placeholder{text-transform:none; letter-spacing:0; font-weight:400; color:var(--faint)}
  .search:focus{border-color:var(--accent); box-shadow:0 2px 12px rgba(37,99,235,.15)}
  .sicon{
    position:absolute; left:17px; top:50%; transform:translateY(-50%);
    width:18px; height:18px; pointer-events:none; color:var(--faint);
  }
  .clearbtn{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:44px; height:44px; border:none; background:none; color:var(--faint);
    font-size:17px; border-radius:22px; display:none; cursor:pointer;
  }
  .app.active .clearbtn{display:block}
  /* mode badge */
  .mode{
    display:none; align-items:center; gap:7px; margin:14px 2px 0;
    font-size:13px; color:var(--muted);
  }
  .app.active .mode{display:flex}
  .mode .tag{
    background:var(--accent-soft); color:var(--accent); font-weight:600;
    font-size:12px; padding:3px 9px; border-radius:6px; white-space:nowrap;
  }
  /* hint chips */
  .hints{margin-top:22px}
  .hints h3{
    font-size:11px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase;
    color:var(--faint); margin:0 2px 10px;
  }
  .chiprow{display:flex; flex-wrap:wrap; gap:8px}
  .chip{
    border:none; background:var(--chip); color:var(--chip-ink);
    border-radius:10px; padding:10px 12px; font-size:13.5px; text-align:left;
    min-height:44px; cursor:pointer; flex:1 1 45%;
    font-family:inherit; display:flex; flex-direction:column; gap:2px;
  }
  .chip:active{opacity:.7}
  .chip code{
    font-family:ui-monospace,Menlo,monospace; font-size:14px; font-weight:700;
    color:var(--accent); letter-spacing:1px;
  }
  .chip span{color:var(--muted); font-size:12px}
  .app.active .hints{display:none}
  /* results */
  .results{margin-top:8px; display:none}
  .app.active .results{display:block}
  .rsum{font-size:13px; color:var(--muted); margin:16px 2px 2px}
  .lgroup{margin-top:18px}
  .lgroup h4{
    font-size:11px; font-weight:700; letter-spacing:1.2px; color:var(--faint);
    text-transform:uppercase; padding-bottom:7px; border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between;
  }
  .words{display:flex; flex-wrap:wrap; gap:7px; padding-top:10px}
  .word{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--chip); border-radius:9px; padding:9px 11px;
    font-size:15px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
    min-height:38px;
  }
  .word em{
    font-style:normal; font-weight:600; font-size:11px; letter-spacing:0;
    background:var(--score); color:var(--score-ink); border-radius:5px; padding:1px 5px;
  }
  .word.hit{background:var(--accent-soft); color:var(--accent)}
  .more{font-size:12.5px; color:var(--faint); align-self:center; padding:6px 4px}
  .empty{padding:44px 0; text-align:center; color:var(--faint); font-size:14px}
  .empty b{display:block; font-size:32px; margin-bottom:10px}
</style>
</head>
<body>
<div class="phone">
  <div class="gbar"><a href="./index.html">‹ Gallery</a><span>01 · Smart Search</span></div>
  <div class="app" id="app">
    <div class="brand"><b>Liv</b>&hairsp;·&hairsp;Word Finder</div>
    <div class="searchwrap">
      <svg class="sicon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="8.5" cy="8.5" r="5.5"/><path d="M13 13l4.5 4.5" stroke-linecap="round"/>
      </svg>
      <input id="q" class="search" type="text" autocomplete="off" autocapitalize="characters"
             spellcheck="false" placeholder="Letters, _pattern_ or word*" aria-label="Search">
      <button class="clearbtn" id="clear" aria-label="Clear">✕</button>
    </div>
    <div class="mode" id="mode"></div>

    <div class="hints" id="hints">
      <h3>Try the syntax</h3>
      <div class="chiprow">
        <button class="chip" data-q="AERSTLN"><code>AERSTLN</code><span>anagram your rack</span></button>
        <button class="chip" data-q="RETINA?"><code>RETINA?</code><span>? = blank tile</span></button>
        <button class="chip" data-q="_A__E"><code>_A__E</code><span>letters in position</span></button>
        <button class="chip" data-q="TRI*"><code>TRI*</code><span>starts with</span></button>
        <button class="chip" data-q="*ING"><code>*ING</code><span>ends with</span></button>
        <button class="chip" data-q="SOLUTE"><code>SOLUTE</code><span>words inside a word</span></button>
      </div>
    </div>

    <div class="results" id="results"></div>
  </div>
</div>

  if(q.includes("_")) return {kind:"pattern", q};
  if(q.endsWith("*")&&!q.startsWith("*")) return {kind:"starts", q:q.slice(0,-1)};
  if(q.startsWith("*")&&!q.endsWith("*")) return {kind:"ends", q:q.slice(1)};
  return {kind:"anagram", q};
}
function run(p){
  if(p.kind==="pattern"){
    const re=new RegExp("^"+p.q.replace(/_/g,"[a-z]").replace(/\*/g,"")+"$");
    return WORDS.filter(w=>w.length===p.q.length&&re.test(w));
  }
  if(p.kind==="starts") return WORDS.filter(w=>w.startsWith(p.q)&&w.length>p.q.length-0);
  if(p.kind==="ends")   return WORDS.filter(w=>w.endsWith(p.q));
  const letters=p.q.replace(/\?/g,""), blanks=(p.q.match(/\?/g)||[]).length;
  const pool={m:counts(letters), len:letters.length};
  return WORDS.filter(w=>w.length>=2&&anagramMatch(w,pool,blanks));
}
const MODE_LABEL={
  anagram:p=>["Anagram", "using letters "+p.q.toUpperCase().split("").join(" ")],
  pattern:p=>["Pattern", p.q.length+" letters, fixed positions"],
  starts:p=>["Starts with", "“"+p.q.toUpperCase()+"…”"],
  ends:p=>["Ends with", "“…"+p.q.toUpperCase()+"”"],
};
const app=document.getElementById("app"), q=document.getElementById("q"),
      res=document.getElementById("results"), mode=document.getElementById("mode");
function render(){
  const p=parse(q.value);
  app.classList.toggle("active", !!p);
  if(!p){res.innerHTML=""; return;}
  const [tag,desc]=MODE_LABEL[p.kind](p);
  mode.innerHTML='<span class="tag">'+tag+'</span><span>'+desc+'</span>';
  let words=run(p);
  if(p.kind==="anagram") words.sort((a,b)=>b.length-a.length||score(b)-score(a)||a.localeCompare(b));
  else words.sort((a,b)=>a.length-b.length||a.localeCompare(b));
  if(!words.length){
    res.innerHTML='<div class="empty"><b>🫥</b>No words found — try adding a “?” blank</div>';
    return;
  }
  const groups={};
  for(const w of words)(groups[w.length]=groups[w.length]||[]).push(w);
  const lens=Object.keys(groups).map(Number).sort((a,b)=>p.kind==="anagram"?b-a:a-b);
  const best=p.kind==="anagram"?words[0]:null;
  let html='<div class="rsum">'+words.length+' word'+(words.length!==1?'s':'')+' found</div>';
  for(const L of lens){
    const g=groups[L], shown=g.slice(0,14);
    html+='<div class="lgroup"><h4><span>'+L+' letters</span><span>'+g.length+'</span></h4><div class="words">'
      + shown.map(w=>'<span class="word'+(w===best?' hit':'')+'">'+w+' <em>'+score(w)+'</em></span>').join("")
      + (g.length>shown.length?'<span class="more">+'+(g.length-shown.length)+' more</span>':'')
      + '</div></div>';
  }
  res.innerHTML=html;
}
q.addEventListener("input",render);
document.getElementById("clear").onclick=()=>{q.value="";render();q.focus();};
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{q.value=c.dataset.q;render();});
</script>
</body>
